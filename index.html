<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mere Pyaare Sartaaj Chachu</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1f1c2c, #928dab);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #fff;
    }
    .card {
      background: rgba(255, 255, 255, 0.1);
      padding: 40px 60px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      text-align: center;
      backdrop-filter: blur(10px);
    }
    .card h1 {
      font-size: 2.5rem;
      margin: 0;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #f9f9f9;
    }
    .card p {
      margin-top: 15px;
      font-size: 1.2rem;
      color: #e0e0e0;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>mere pyaare sartaaj chachu</h1>
    <p>With love and respect</p>
  </div>
</body>
</html>
