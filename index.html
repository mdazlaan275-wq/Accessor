<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Accessor - Core Matrix</title>
  <style>
    :root {
      --bg-main: #060606;
      --bg-panel: #111111;
      --accent-red: #ff2d2d;
      --accent-orange: #ff9500;
      --text-light: #eeeeee;
      --nav-height: 65px;
    }
    html, body { background: var(--bg-main); color: var(--text-light); font-family: sans-serif; margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; }
    .hidden { display: none !important; }

    /* REDEEM BUTTON - Bottom Right */
    #redeemTrigger {
      position: fixed;
      bottom: 80px;
      right: 20px;
      background: #ff2d2d;
      color: white;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      cursor: pointer;
      z-index: 9999; /* Ensure it stays on top */
      box-shadow: 0 0 15px rgba(255,45,45,0.6);
      border: 2px solid #000;
    }
    
    /* ... (rest of your styles remain unchanged) ... */
  </style>
</head>
<body>

<div id="redeemTrigger" class="hidden">R</div>

<script type="module">
  // ... (your existing imports) ...
  import { getDatabase, ref, push, onChildAdded, set, onValue } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-database.js";

  // ... (your existing setup variables) ...

  function bootSystemSocialCoreEngine() {
    systematicChatInitialized = true;

    // --- DEBUGGING REDEEM CODE ENGINE ---
    const redeemTrigger = document.getElementById("redeemTrigger");
    
    // This listens to the "reedom" node exactly as you specified
    onValue(ref(db, 'reedom'), (snapshot) => {
        const data = snapshot.val();
        console.log("[DEBUG] Reedom Data received:", data); // Check console for this output

        if (data && data.allow) {
            console.log("[DEBUG] Access allowed, showing button.");
            redeemTrigger.classList.remove("hidden");
            
            // Set up click action
            redeemTrigger.onclick = () => {
                const inputCode = prompt("Enter Access Code:");
                if (inputCode === data.code) {
                    alert("System Override Initiated for UID: " + data.uid);
                } else {
                    alert("Invalid code.");
                }
            };
        } else {
            console.log("[DEBUG] Reedom node is missing or allow is false.");
            redeemTrigger.classList.add("hidden");
        }
    });

    // ... (rest of your existing functions) ...
  }
</script>
</body>
</html>
