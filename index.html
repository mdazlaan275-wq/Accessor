<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accessor Secure</title>
    <style>
        :root { --bg-main: #060606; --bg-panel: #111111; --accent-red: #ff2d2d; --text-light: #eeeeee; }
        body { background: var(--bg-main); color: var(--text-light); font-family: sans-serif; margin: 0; padding: 0; height: 100vh; display: flex; justify-content: center; align-items: center; }
        .screen { width: 100%; max-width: 400px; padding: 20px; text-align: center; }
        .hidden { display: none !important; }
        .input-box { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #333; background: #161616; color: white; box-sizing: border-box; }
        button { background: var(--accent-red); color: white; border: none; padding: 12px 25px; border-radius: 20px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }
        #adminControls { border: 2px dashed var(--accent-red); padding: 15px; margin-top: 20px; border-radius: 10px; }
    </style>
</head>
<body>

<div id="authScreen" class="screen">
    <h1>ACCESSOR</h1>
    <input type="text" id="userName" class="input-box" placeholder="Your Name">
    <input type="email" id="userEmail" class="input-box" placeholder="Email">
    <input type="password" id="userPass" class="input-box" placeholder="Password">
    <button onclick="handleAuth()">LOGIN / SIGN UP</button>
</div>

<div id="chatScreen" class="screen hidden">
    <h2>Welcome to Accessor</h2>
    <button onclick="logout()" style="background: #444;">Logout</button>
    
    <div id="adminControls" class="hidden">
        <h3>🛡️ Admin Console</h3>
        <button onclick="clearDatabase()" style="background: #800;">Wipe All Messages</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-auth.js";
    import { getDatabase, ref, remove } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBa4VeqtkTiG1DBcT8bb9mrFMoeJtfTfcU",
        authDomain: "project1-a8022.firebaseapp.com",
        databaseURL: "https://project1-a8022-default-rtdb.firebaseio.com",
        projectId: "project1-a8022",
        storageBucket: "project1-a8022.appspot.com",
        messagingSenderId: "46609816135",
        appId: "1:46609816135:web:3c7b21c3c82c05cb682f62"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    
    // Set Persistence so users stay logged in
    setPersistence(auth, browserLocalPersistence);

    // Your Admin UID inserted
    const ADMIN_UID = "68xzbGh2K6MxKZW8TeRTEhSjph42"; 

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('authScreen').classList.add('hidden');
            document.getElementById('chatScreen').classList.remove('hidden');
            // Check if user is the admin
            if(user.uid === ADMIN_UID) {
                document.getElementById('adminControls').classList.remove('hidden');
            }
        } else {
            document.getElementById('authScreen').classList.remove('hidden');
            document.getElementById('chatScreen').classList.add('hidden');
            document.getElementById('adminControls').classList.add('hidden');
        }
    });

    window.handleAuth = async () => {
        const email = document.getElementById('userEmail').value;
        const pass = document.getElementById('userPass').value;
        try {
            await signInWithEmailAndPassword(auth, email, pass);
        } catch (e) {
            if (e.code === 'auth/user-not-found' || e.code === 'auth/invalid-credential' || e.code === 'auth/invalid-email') {
                await createUserWithEmailAndPassword(auth, email, pass);
            } else {
                alert(e.message);
            }
        }
    };

    window.logout = () => signOut(auth);
    window.clearDatabase = () => {
        if(confirm("Are you sure you want to delete all messages?")) {
            remove(ref(db, 'messages'));
        }
    };
</script>
</body>
</html>
