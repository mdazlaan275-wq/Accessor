<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Accessor - Core Matrix</title>
  <style>
    :root {
      --bg-main: #060606;
      --bg-panel: #111111;
      --accent-red: #ff2d2d;
      --accent-orange: #ff9500;
      --text-light: #eeeeee;
      --bubble-me: #2b0808;
      --bubble-them: #1c1c1c;
      --nav-height: 65px;
    }

    html, body {
      background: var(--bg-main);
      color: var(--text-light);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0; padding: 0;
      height: 100%; width: 100%;
      overflow: hidden;
    }

    .hidden { display: none !important; }

    /* ================= LOGIN SCREEN ================= */
    #loginScreen {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100%; background: radial-gradient(circle at center, #1a0303 0%, #060606 100%);
      padding: 20px; box-sizing: border-box;
    }

    .login-card {
      background: var(--bg-panel); border: 2px solid var(--accent-red);
      border-radius: 20px; padding: 30px 20px; text-align: center;
      box-shadow: 0 0 30px rgba(255, 45, 45, 0.4); width: 100%; max-width: 400px; box-sizing: border-box;
    }

    .login-card h1 {
      font-size: 28px; letter-spacing: 4px; margin-top: 0; margin-bottom: 5px;
      color: white; text-shadow: 0 0 10px rgba(255, 45, 45, 0.6);
    }
    
    .login-card p {
      color: #888; font-size: 13px; margin-bottom: 20px;
    }

    /* Guest Input Styling */
    .guest-input {
      width: 100%; background: #161616; border: 1px solid #444; color: white; 
      padding: 14px; border-radius: 12px; font-size: 16px; box-sizing: border-box;
      margin-bottom: 10px; text-align: center;
    }
    .guest-input:focus { border-color: var(--accent-orange); outline: none; }
    
    .redeem-input {
      width: 100%; background: #0a0a0a; border: 1px dashed var(--accent-red); color: var(--accent-red); 
      padding: 14px; border-radius: 12px; font-size: 14px; box-sizing: border-box;
      margin-bottom: 20px; text-align: center; letter-spacing: 1px;
    }
    .redeem-input:focus { border-color: white; outline: none; color: white; }

    #loginBtn {
      width: 100%; padding: 14px 20px; font-size: 16px; font-weight: bold; color: white;
      background: linear-gradient(135deg, var(--accent-red), #ff7300); border: none;
      border-radius: 30px; cursor: pointer; box-shadow: 0 0 20px rgba(255, 70, 0, 0.6);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    #loginBtn:active { transform: scale(0.96); }

    /* ================= MAIN ENGINE NAVIGATION LAYOUT ================= */
    #mainApp { height: 100%; display: flex; flex-direction: column; }
    
    .app-view {
      flex: 1; display: none;
      height: calc(100vh - var(--nav-height));
      box-sizing: border-box;
    }
    .app-view.active { display: flex; flex-direction: column; }

    .chat-header {
      background: var(--bg-panel); border-bottom: 2px solid var(--accent-red);
      padding: 10px 15px; display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 10; height: 60px; flex-shrink: 0;
    }

    .brand-meta { display: flex; align-items: center; gap: 10px; }
    .brand-logo { font-weight: 900; font-size: 18px; letter-spacing: 2px; color: white; text-shadow: 0 0 8px var(--accent-red); }
    
    .current-profile {
      display: flex; align-items: center; gap: 8px; background: #00000040;
      padding: 4px 8px; border-radius: 20px; border: 1px solid #333;
    }
    .current-profile img { width: 26px; height: 26px; border-radius: 50%; border: 1px solid var(--accent-orange); object-fit: cover; }
    .current-profile span { font-size: 12px; color: var(--accent-orange); font-weight: 600; max-width: 80px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ================= 1. REELS FEED VIEW ================= */
    #reelsContainer { flex: 1; scroll-snap-type: y mandatory; overflow-y: auto; background: #000; height: 100%; }
    .reel-item {
      height: 100%; width: 100%; scroll-snap-align: start; position: relative;
      display: flex; align-items: center; justify-content: center; background: #000;
    }
    .reel-content { width: 100%; height: 100%; object-fit: contain; }
    .reel-ui {
      position: absolute; bottom: 20px; left: 15px; right: 15px;
      display: flex; justify-content: space-between; align-items: flex-end;
      text-shadow: 0 2px 8px rgba(0,0,0,1); z-index: 5; background: linear-gradient(transparent, rgba(0,0,0,0.7));
      padding: 10px; border-radius: 10px;
    }
    .reel-author { font-weight: bold; font-size: 16px; margin-bottom: 5px; color: var(--accent-orange); }
    .reel-caption { font-size: 13px; color: #fff; }
    .reel-actions { display: flex; flex-direction: column; gap: 15px; font-size: 24px; color: white; }

    .empty-reels-state {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100%; width: 100%; text-align: center; padding: 30px; box-sizing: border-box;
      background: radial-gradient(circle at center, #110202 0%, #060606 100%);
    }
    .empty-icon-terminal { font-size: 50px; color: #333; margin-bottom: 15px; animation: pulse 2s infinite; }
    .empty-title { font-size: 18px; font-weight: 800; letter-spacing: 2px; color: #555; margin-bottom: 5px; }
    .empty-subtitle { font-size: 12px; color: #3b3b3b; margin-bottom: 20px; text-transform: uppercase; }
    
    .action-pill-btn {
      background: transparent; border: 1px solid var(--accent-red); color: var(--accent-red);
      padding: 10px 24px; font-weight: bold; border-radius: 20px; cursor: pointer; font-size: 12px;
      box-shadow: 0 0 10px rgba(255,45,45,0.2); transition: all 0.2s;
    }
    .action-pill-btn:active { background: var(--accent-red); color: white; }

    /* ================= MESSAGING ROOM ENGINES ================= */
    .chat-body {
      flex: 1; 
      overflow-y: auto; 
      padding: 15px;
      
      background-color: #0a0101;
      background-image: 
        linear-gradient(rgba(255, 45, 45, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 45, 45, 0.08) 1px, transparent 1px),
        radial-gradient(circle at center, rgba(150, 10, 10, 0.25) 0%, #0a0101 80%);
      background-size: 30px 30px, 30px 30px, 100% 100%;
      background-position: center center;
      background-attachment: fixed;
      
      display: flex; flex-direction: column; gap: 15px;
    }

    .msg-row { display: flex; width: 100%; align-items: flex-end; gap: 8px; }
    .msg-row.me { justify-content: flex-end; }
    .msg-row.them { justify-content: flex-start; }
    .avatar-space { width: 32px; height: 32px; flex-shrink: 0; }
    .avatar-space img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; box-shadow: 0 0 6px rgba(0,0,0,0.5); border: 1px solid #444; }
    
    .bubble { max-width: 85%; padding: 10px 14px; border-radius: 18px; position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.3); word-break: break-word; display: flex; flex-direction: column; }
    .me .bubble { background: var(--bubble-me); border: 1px solid #ff2d2d40; border-bottom-right-radius: 4px; color: #f5f5f5; }
    .them .bubble { background: var(--bubble-them); border: 1px solid #333; border-bottom-left-radius: 4px; color: #e0e0e0; }

    .msg-meta-name { font-size: 11px; font-weight: bold; margin-bottom: 4px; }
    .me .msg-meta-name { color: var(--accent-orange); text-align: right; }
    .them .msg-meta-name { color: #00adb5; text-align: left; }
    .msg-text { font-size: 14px; line-height: 1.4; }

    .msg-media { margin-top: 6px; border-radius: 8px; overflow: hidden; background: #00000050; border: 1px solid #444; }
    .msg-media img, .msg-media video { max-width: 100%; max-height: 200px; display: block; object-fit: contain; }
    
    .doc-file-card { display: flex; align-items: center; gap: 10px; padding: 8px; text-decoration: none; color: white; }
    .doc-icon { font-size: 20px; }
    .doc-details { display: flex; flex-direction: column; overflow: hidden; }
    .doc-name { font-size: 13px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .doc-download-lbl { font-size: 10px; color: var(--accent-orange); margin-top: 2px; }
    .msg-timestamp { font-size: 10px; color: #777; margin-top: 5px; align-self: flex-end; }

    .chat-footer {
      background: var(--bg-panel); padding: 10px; display: flex; align-items: center; gap: 8px;
      border-top: 1px solid #222; box-shadow: 0 -4px 15px rgba(0,0,0,0.6); box-sizing: border-box; flex-shrink: 0;
    }
    .attach-btn-label { width: 40px; height: 40px; background: #1f1f1f; border: 1px solid #333; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--accent-red); flex-shrink: 0; }
    .attach-btn-label span { font-size: 26px; line-height: 1; margin-top: -2px; }
    .input-wrapper { flex: 1; }
    .terminal-input-style { width: 100%; background: #161616; border: 1px solid #333; color: white; padding: 12px 14px; border-radius: 20px; font-size: 14px; box-sizing: border-box; }
    .terminal-input-style:focus { border-color: var(--accent-red); outline: none; }
    .circle-send-btn { background: linear-gradient(135deg, var(--accent-red), #b30000); border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .circle-send-btn svg { width: 18px; height: 18px; fill: white; margin-left: 2px; }

    /* ================= 3. PRIVATE P2P DIRECT MESSAGE SYSTEM ================= */
    .view-header-title { padding: 15px; background: var(--bg-panel); border-bottom: 1px solid #222; text-align: center; font-weight: bold; letter-spacing: 1px; height: 60px; box-sizing: border-box; display: flex; align-items: center; justify-content: center; position: relative; }
    .dm-back-btn { position: absolute; left: 15px; background: #222; border: 1px solid #444; color: white; padding: 4px 10px; border-radius: 5px; font-size: 12px; cursor: pointer; }
    
    #dmUserListContainer { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
    .user-matrix-card {
      background: var(--bg-panel); border: 1px solid #222; border-radius: 12px; padding: 12px;
      display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: border-color 0.2s;
    }
    .user-matrix-card:active { border-color: var(--accent-red); background: #161616; }
    .user-matrix-left { display: flex; align-items: center; gap: 12px; }
    .user-matrix-avatar { width: 40px; height: 40px; border-radius: 50%; border: 1px solid #444; object-fit: cover; }
    .user-matrix-info { display: flex; flex-direction: column; }
    .user-matrix-name { font-weight: bold; font-size: 14px; color: white; }
    .user-matrix-status { font-size: 11px; color: #00ff66; margin-top: 2px; }
    
    .user-list-unread-dot {
      width: 18px; height: 18px; background: #00ff66; border-radius: 50%;
      color: black; font-size: 10px; font-weight: 900; display: flex;
      align-items: center; justify-content: center; box-shadow: 0 0 10px #00ff66;
    }

    /* ================= 4. ACCOUNT CONFIGURATION VIEW ================= */
    #profileView { text-align: center; background: #0b0b0b; height: 100%; }
    .profile-card-layout { padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
    .large-profile-avatar { width: 110px; height: 110px; border-radius: 50%; border: 3px solid var(--accent-red); object-fit: cover; margin-bottom: 15px; box-shadow: 0 0 20px rgba(255,45,45,0.3); }
    .profile-display-name { font-size: 24px; font-weight: bold; color: white; margin: 5px 0; }
    .profile-email-meta { font-size: 14px; color: #666; margin-bottom: 30px; }
    .logout-action-btn { background: #1a1a1a; border: 1px solid #333; color: var(--accent-red); padding: 12px 30px; border-radius: 25px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
    
    /* ================= BOTTOM NAVIGATION BAR ================= */
    .bottom-nav {
      height: var(--nav-height); background: var(--bg-panel); border-top: 1px solid #222;
      display: flex; justify-content: space-around; align-items: center;
      padding-bottom: env(safe-area-inset-bottom); box-sizing: border-box; z-index: 100; flex-shrink: 0;
    }
    .nav-item { color: #555; font-size: 11px; font-weight: bold; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; width: 25%; text-align: center; position: relative; }
    .nav-item.active { color: var(--accent-red); }
    .nav-icon { font-size: 22px; }

    .nav-green-alert-badge {
      position: absolute; top: 2px; right: 22%; background: #00ff66; color: #000;
      font-size: 10px; font-weight: 900; min-width: 16px; height: 16px;
      border-radius: 10px; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 10px #00ff66; padding: 0 2px; box-sizing: border-box;
    }

    @keyframes pulse { 0% { opacity: 0.3; } 50% { opacity: 0.7; } 100% { opacity: 0.3; } }
    @media (min-width: 768px) { .bubble { max-width: 60%; } }
  </style>
</head>
<body>

<!-- AUTHORIZATION PORT CONTAINER -->
<div id="loginScreen" class="hidden">
  <div class="login-card">
    <h1>ACCESSOR</h1>
    <p>Zero-Trace Peer-to-Peer Relay</p>
    
    <input type="text" id="guestNameInput" class="guest-input" placeholder="Enter an alias / nickname..." autocomplete="off">
    
    <!-- NEW REDEEM CODE INPUT -->
    <input type="text" id="redeemCodeInput" class="redeem-input" placeholder="Optional: Secret Code" autocomplete="off">

    <button id="loginBtn">Initialize Connection</button>
  </div>
</div>

<!-- CENTRAL SOCIAL FRAMEWORK SYSTEM -->
<div id="mainApp" class="hidden">
    
  <!-- 1. HOME / REELS DYNAMIC PANEL -->
  <div id="reelsView" class="app-view active">
    <header class="chat-header">
      <div class="brand-meta"><div class="brand-logo">ACCESSOR REELS</div></div>
      <button class="action-pill-btn" id="triggerReelUploadBtn">+ Add Status</button>
      <input type="file" id="reelFileInput" style="display:none;" accept="image/*,video/*">
    </header>
    
    <div id="reelsContainer">
      <div class="empty-reels-state" id="reelsEmptyPlaceholder">

        <div class="empty-title">NO REELS YET</div>
        <div class="empty-subtitle">Secure transmission feed currently offline</div>
      </div>
    </div>
  </div>

  <!-- 2. GLOBAL GROUP CHAT VIEW -->
  <div id="groupChatView" class="app-view">
    <header class="chat-header">
      <div class="brand-meta">
        <div class="brand-logo">GLOBAL MATRIX</div>
        <div class="current-profile">
          <img class="userHeaderAvatarClass" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="Avatar">
          <span class="userHeaderNameClass">...</span>
        </div>

    <main class="chat-body" id="chatDisplayPanel"></main>
    <footer class="chat-footer">
      <label for="fileAttachmentInput" class="attach-btn-label"><span>+</span></label>

      <div class="input-wrapper">
        <input type="text" id="chatTextInput" class="terminal-input-style" placeholder="Message Global...">
      </div>
      <button id="sendBtn" class="circle-send-btn">
        <svg viewBox="0 0 24 24"><path d="M2,21L23,12L2,3V10L17,12L2,14V21Z"/></svg>
      </button>
    </footer>
  </div>

  <!-- 3. FUNCTIONAL PRIVATE P2P DIRECT MESSAGING VIEW -->
  <div id="dmView" class="app-view">
    <div id="dmUserListState" style="display: flex; flex-direction: column; flex: 1;">
      <div class="view-header-title">SECURE LINES</div>
      <div id="dmUserListContainer"></div>
    </div>

    <div id="dmChatWindowState" class="hidden" style="flex-direction: column; flex: 1;">
      <div class="view-header-title">
        <button class="dm-back-btn" id="closeDmChatWindowBtn">📴 Back</button>
        <span id="activeDmTargetTitleName">Line Connected</span>
      </div>
      <main class="chat-body" id="dmChatDisplayPanel"></main>
      <footer class="chat-footer">
        <label for="dmFileAttachmentInput" class="attach-btn-label"><span>+</span></label>
        <input type="file" id="dmFileAttachmentInput" style="display: none;">
        <div class="input-wrapper">
          <input type="text" id="dmChatTextInput" class="terminal-input-style" placeholder="Secure Transmission...">
        </div>
        <button id="dmSendBtn" class="circle-send-btn">
          <svg viewBox="0 0 24 24"><path d="M2,21L23,12L2,3V10L17,12L2,14V21Z"/></svg>
        </button>
      </footer>
    </div>
  </div>

  <!-- 4. USER PROFILE VIEW -->
  <div id="profileView" class="app-view">
    <div class="view-header-title">MY ACCOUNT IDENTITY</div>
    <div class="profile-card-layout">
      <img id="largeProfileAvatar" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" class="large-profile-avatar" alt="User Profile Picture">
      <div id="profileDisplayName" class="profile-display-name">Loading...</div>
      <div id="profileEmailMeta" class="profile-email-meta">...</div>
      <button class="logout-action-btn" id="logoutBtn">Disconnect Transmission Session</button>
    </div>
  </div>

  <!-- BOTTOM NAVIGATION -->
  <div class="bottom-nav">
    <div class="nav-item active" data-target="reelsView">
      <span class="nav-icon">📱</span><span>Home</span>
    </div>
    <div class="nav-item" data-target="groupChatView">
      <span class="nav-icon">🌍</span><span>Group</span>
    </div>
    <div class="nav-item" data-target="dmView" id="navDmTabElement">
      <span class="nav-icon">💬</span><span>Chat</span>
      <span class="nav-green-alert-badge hidden" id="globalDmNavBadge">1</span>
    </div>
    <div class="nav-item" data-target="profileView">
      <span class="nav-icon">👤</span><span>Profile</span>
    </div>
  </div>
</div>

  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-app.js";
  import { getAuth, signInAnonymously, updateProfile, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-auth.js";

    measurementId: "G-WWSZV54BBK"
  };

  const SUPABASE_URL = "https://viwxoslxgwdchrpnuyze.supabase.co";

  const app = initializeApp(firebaseConfig);

  loginBtn.addEventListener("click", async () => { 
    const inputAlias = guestNameInput.value.trim();
    const inputCode = redeemCodeInput.value.trim();
    
    let finalAlias = inputAlias;
    let isDevMode = false;

    // --- SECRET REDEEM CODE CHECK ---
    if (inputCode === "DEV-777") {
      finalAlias = "dev";
      isDevMode = true;
    } else if (!finalAlias) {
      alert("System Protocol Requires an Alias to connect.");
      return;
    }

    try { 
      loginBtn.innerText = "Connecting...";
      loginBtn.disabled = true;

      // Log in anonymously
      const userCredential = await signInAnonymously(auth);
      
      // Developer profile string provided by user
      const devPhotoString = "data:image/png;base64,QgS5QPFhDKkd3I5gAB4NzyQcY0MYGiq0b5MD3udaMzCYp0EkOuzCDw4jrszH2D79w8e1Y5tn4Ttj5ZCp4WEKgJBnVhv0d9j5cTxwReUa25Q6MQKeIHvupiZFItwWijPuratNADoA98J7k5nPn6Z1hFzomJU1Os+x1L9Bx8ZpwEPPRIg51x+3Z0GPA+iHAAAAACp5HOxNIBZLY0lkAjAAAA=";

      // Attach their alias and specific dev photo (if applicable)
      await updateProfile(userCredential.user, {
        displayName: finalAlias,
        photoURL: isDevMode ? devPhotoString : ""
      });

      // Reloading the page forces the listener to sync the new Dev data perfectly to Firebase
      window.location.reload();

    } catch(e) { 
      alert("Connection Blocked: " + e.message); 
      loginBtn.innerText = "Initialize Connection";
      loginBtn.disabled = false;
    } 
  });

  logoutBtn.addEventListener("click", async () => { 
    if(confirm("Terminate connection and destroy guest session?")) { 
      await signOut(auth); 
      window.location.reload(); 
    } 
  });

  // Navigation Tab Management
  document.querySelectorAll('.nav-item').forEach(navItem => {
    navItem.addEventListener('click', function() {
      currentActiveTabId = this.getAttribute('data-target');
      
      document.querySelectorAll('.app-view').forEach(view => view.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
      
      document.getElementById(currentActiveTabId).classList.add('active');
      this.classList.add('active');
      
      if(currentActiveTabId === 'groupChatView') chatDisplayPanel.scrollTop = chatDisplayPanel.scrollHeight;
      if(currentActiveTabId === 'dmView' && activeDmRoomId) {
        dmChatDisplayPanel.scrollTop = dmChatDisplayPanel.scrollHeight;
      }
    });
  });

  function bootSystemSocialCoreEngine() {
    systematicChatInitialized = true;

    // --- CHANNEL 1: GLOBAL GROUP ROOM WORKSPACE ---
    onChildAdded(ref(db, 'messages'), (snapshot) => {
      if (snapshot.val()) renderMessageBubble(snapshot.val(), chatDisplayPanel);
    });
    sendBtn.onclick = () => executeTextTransmission('messages', chatTextInput);
    chatTextInput.onkeypress = (e) => { if (e.key === 'Enter') executeTextTransmission('messages', chatTextInput); };
    fileAttachmentInput.addEventListener("change", (e) => executeFileAttachmentUpload(e, 'messages', fileAttachmentInput, chatTextInput));

    // --- CHANNEL 2: REWIRED LIVE VALUE DIRECTORY NODE ---
    onValue(ref(db, 'users'), (snapshot) => {
      dmUserListContainer.innerHTML = '';
      let executionHasPeers = false;
      
      snapshot.forEach((childSnapshot) => {
        const userData = childSnapshot.val();
        if (userData && userData.uid !== localUserReference.uid) {
          executionHasPeers = true;
          renderUserMatrixItem(userData);
        }
      });

      if (!executionHasPeers) {
        dmUserListContainer.innerHTML = '<div class="placeholder-fallback-text" style="padding:20px; color:#555; text-align:center;">🔒 No other peer connection streams detected on the grid.</div>';
      }
    });

    closeDmChatWindowBtn.onclick = () => {
      dmChatWindowState.classList.add("hidden");
      dmChatWindowState.style.display = "none";
      dmUserListState.style.display = "flex";
      activeDmRoomId = null;
    };

    dmSendBtn.onclick = () => executeTextTransmission(`direct_messages/${activeDmRoomId}`, dmChatTextInput);
    dmChatTextInput.onkeypress = (e) => { if (e.key === 'Enter') executeTextTransmission(`direct_messages/${activeDmRoomId}`, dmChatTextInput); };
    dmFileAttachmentInput.addEventListener("change", (e) => executeFileAttachmentUpload(e, `direct_messages/${activeDmRoomId}`, dmFileAttachmentInput, dmChatTextInput));

    // --- CHANNEL 3: REAL-TIME NOTIFICATION ENGINE ---
    onChildAdded(ref(db, 'direct_messages'), (roomSnapshot) => {
      const roomId = roomSnapshot.key;
      if (!roomId.includes(localUserReference.uid)) return;

      onChildAdded(ref(db, `direct_messages/${roomId}`), (msgSnapshot) => {
        const msg = msgSnapshot.val();
        if (!msg) return;

        if (msg.uid !== localUserReference.uid && msg.timestamp > appBootTimestamp) {
          if (currentActiveTabId !== 'dmView' || activeDmRoomId !== roomId) {
            const externalSenderUid = roomId.replace(localUserReference.uid, "").replace("_", "");
            unreadRoomsMap[externalSenderUid] = true;
            evaluateNotificationBadgeEngine();
          }
        }
        
        if (activeDmRoomId === roomId) {
          renderMessageBubble(msg, dmChatDisplayPanel);
        }
      });
    });

    // --- CHANNEL 4: REELS PIPELINE SYNC ---
    onChildAdded(ref(db, 'reels'), (snapshot) => {
      const data = snapshot.val();
      if(data) {
        if(reelsEmptyPlaceholder) reelsEmptyPlaceholder.remove();
        renderReelAsset(data);
      }
    });

    triggerReelUploadBtn.onclick = () => reelFileInput.click();
    reelFileInput.addEventListener("change", executeReelAttachmentUpload);
  }

  // Text Engine Subsystems
  async function executeTextTransmission(targetNodePath, inputElement) {
    const textPayload = inputElement.value.trim();
    if (!textPayload || !localUserReference) return;
    inputElement.value = ''; 
    try {
      await push(ref(db, targetNodePath), {
        uid: localUserReference.uid,
        senderName: localUserReference.displayName || "Guest",
        senderPhoto: localUserReference.photoURL || '',
        text: textPayload,
        timestamp: Date.now()
      });
    } catch (err) { console.error("Sync fault caught:", err); }
  }

  // File Delivery Storage Subsystems
  async function executeFileAttachmentUpload(e, targetNodePath, fileInput, textInput) {
    const file = e.target.files[0];
    
    if (!file || !localUserReference) {
      alert("System Interface Exception: No structural file asset was transmitted.");
      return;
    }

    textInput.disabled = true;
    textInput.placeholder = `Uploading asset: ${file.name}...`;
    const sanitizedFileName = `${Date.now()}_${file.name.replace(/[^a-zA-Z0-9.\-_]/g, '_')}`;

    try {
      const { error } = await supabaseClient.storage.from('new_photos').upload(sanitizedFileName, file, { cacheControl: '3600', upsert: true });
      if (error) throw error;

      const { data: publicUrlData } = supabaseClient.storage.from('new_photos').getPublicUrl(sanitizedFileName);
      await push(ref(db, targetNodePath), {
        uid: localUserReference.uid,
        senderName: localUserReference.displayName || "Guest",
        senderPhoto: localUserReference.photoURL || '',
        text: `Shared a file`,
        fileUrl: publicUrlData.publicUrl,
        fileName: file.name,
        fileType: file.type,
        timestamp: Date.now()
      });
    } catch (err) { alert("Asset storage abort: " + err.message); } 
    finally { fileInput.value = ''; textInput.disabled = false; textInput.placeholder = "Message..."; }
  }

  // Isolated Encrypted Room Routing Switches
  window.initializePrivateChatRoomTunnel = function(targetUser) {
    dmUserListState.style.display = "none";
    dmChatWindowState.classList.remove("hidden");
    dmChatWindowState.style.display = "flex";
    activeDmTargetTitleName.innerText = targetUser.name;
    
    dmChatDisplayPanel.innerHTML = '';
    const myUid = localUserReference.uid;
    activeDmRoomId = myUid < targetUser.uid ? `${myUid}_${targetUser.uid}` : `${targetUser.uid}_${myUid}`;

    delete unreadRoomsMap[targetUser.uid];
    evaluateNotificationBadgeEngine();

    onValue(ref(db, `direct_messages/${activeDmRoomId}`), (snapshot) => {
      dmChatDisplayPanel.innerHTML = '';
      snapshot.forEach((childSnap) => {
        const msg = childSnap.val();
        if(msg) renderMessageBubble(msg, dmChatDisplayPanel);
      });
    }, { onlyOnce: true });
  };

  // Notification Array Engine Evaluator
  function evaluateNotificationBadgeEngine() {
    const totalUnreadChannelsCount = Object.keys(unreadRoomsMap).length;
    
    if (totalUnreadChannelsCount > 0) {
      globalDmNavBadge.innerText = "1";
      globalDmNavBadge.classList.remove("hidden");
    } else {
      globalDmNavBadge.classList.add("hidden");
    }

    Object.keys(unreadRoomsMap).forEach(uid => {
      const trackingIndicatorNode = document.getElementById(`unread-point-${uid}`);
      if (trackingIndicatorNode) trackingIndicatorNode.classList.remove("hidden");
    });
  }

  // Reels Engine Pipeline Media Router
  async function executeReelAttachmentUpload(e) {
    const file = e.target.files[0];
    if (!file || !localUserReference) return;

    triggerReelUploadBtn.innerText = "Syncing...";
    triggerReelUploadBtn.disabled = true;
    const sanitizedFileName = `reel_${Date.now()}_${file.name.replace(/[^a-zA-Z0-9.\-_]/g, '_')}`;

    try {
      const { error } = await supabaseClient.storage.from('new_photos').upload(sanitizedFileName, file, { cacheControl: '3600', upsert: true });
      if (error) throw error;

      const { data: publicUrlData } = supabaseClient.storage.from('new_photos').getPublicUrl(sanitizedFileName);
      const textMetaPrompt = prompt("Add status description log (Caption):") || "";

      await push(ref(db, 'reels'), {
        uid: localUserReference.uid,
        senderName: localUserReference.displayName || "Guest",
        fileUrl: publicUrlData.publicUrl,
        fileType: file.type,
        caption: textMetaPrompt,
        timestamp: Date.now()
      });
    } catch (err) { alert("Reel upload failure: " + err.message); } 
    finally { reelFileInput.value = ''; triggerReelUploadBtn.innerText = "+ Add Status"; triggerReelUploadBtn.disabled = false; }
  }

  // Dynamic UI Element Builders
  function renderUserMatrixItem(user) {
    const div = document.createElement("div");
    div.className = "user-matrix-card";
    
    const containsAlertMarker = unreadRoomsMap[user.uid] ? "" : "hidden";

    div.innerHTML = `
      <div class="user-matrix-left">
        <img src="${user.photo}" class="user-matrix-avatar" alt="Avatar">
        <div class="user-matrix-info">
          <span class="user-matrix-name">${user.name}</span>
          <span class="user-matrix-status">🟢 Online</span>
        </div>
      </div>
      <span class="user-list-unread-dot ${containsAlertMarker}" id="unread-point-${user.uid}">1</span>
    `;
    div.onclick = () => initializePrivateChatRoomTunnel(user);
    dmUserListContainer.appendChild(div);
  }

  function renderReelAsset(reel) {
    const div = document.createElement("div");
    div.className = "reel-item";
    
    let mediaTemplate = `<img src="${reel.fileUrl}" class="reel-content" loading="lazy">`;
    if(reel.fileType && reel.fileType.startsWith('video/')) {
      mediaTemplate = `<video src="${reel.fileUrl}" class="reel-content" autoplay loop muted playsinline></video>`;
    }

    div.innerHTML = `
      ${mediaTemplate}
      <div class="reel-ui">
        <div>
          <div class="reel-author">@${reel.senderName}</div>
          <div class="reel-caption">${reel.caption}</div>
        </div>
        <div class="reel-actions"><span>❤️</span><span>💬</span></div>
      </div>
    `;
    reelsContainer.appendChild(div);
  }

  function renderMessageBubble(msg, targetContainer) {
    const isMe = msg.uid === localUserReference?.uid;
    const directionClass = isMe ? 'me' : 'them';
    const fallbackUrl = 'https://api.dicebear.com/7.x/identicon/svg?seed=' + encodeURIComponent(msg.senderName);
    
    const row = document.createElement('div');
    row.className = `msg-row ${directionClass}`;

    const avatarTemplate = `
      <div class="avatar-space">
        <img src="${msg.senderPhoto || fallbackUrl}" alt="Profile" onerror="this.src='${fallbackUrl}'">
      </div>`;

    let attachmentTemplate = '';
    if (msg.fileUrl) {
      if (msg.fileType && msg.fileType.startsWith('image/')) {
        attachmentTemplate = `<div class="msg-media"><a href="${msg.fileUrl}" target="_blank"><img src="${msg.fileUrl}" loading="lazy"></a></div>`;
      } else if (msg.fileType && msg.fileType.startsWith('video/')) {
        attachmentTemplate = `<div class="msg-media"><video src="${msg.fileUrl}" controls playsinline></video></div>`;
      } else {
        attachmentTemplate = `
          <div class="msg-media">
            <a href="${msg.fileUrl}" target="_blank" class="doc-file-card" download="${msg.fileName}">
              <div class="doc-icon">📁</div>
              <div class="doc-details"><span class="doc-name">${msg.fileName || 'Document'}</span><span class="doc-download-lbl">Download</span></div>
            </a>
          </div>`;
      }
    }

    const standardTimeSignature = new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    const bubbleContent = `
      <div class="bubble">
        <span class="msg-meta-name">${msg.senderName}</span>
        <div class="msg-text">${msg.text}</div>
        ${attachmentTemplate}
        <span class="msg-timestamp">${standardTimeSignature}</span>
      </div>`;

    row.innerHTML = isMe ? bubbleContent + avatarTemplate : avatarTemplate + bubbleContent;
    targetContainer.appendChild(row);
    targetContainer.scrollTop = targetContainer.scrollHeight;
  }
</script>
</body>
</html>
