<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Accessor - Secure Chat</title>
<style>
  :root {
    --bg-main: #060606;
    --bg-panel: #111111;
    --accent-red: #ff2d2d;
    --accent-orange: #ff9500;
    --text-light: #eeeeee;
    --bubble-me: #2b0808;
    --bubble-them: #1c1c1c;
  }

  html, body {
    background: var(--bg-main);
    color: var(--text-light);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    overflow: hidden; /* Prevents mobile rubber-banding */
  }

  .hidden { display: none !important; }

  /* Login Screen Setup */
  #loginScreen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    background: radial-gradient(circle at center, #1a0303 0%, #060606 100%);
    padding: 20px;
    box-sizing: border-box;
  }

  .login-card {
    background: var(--bg-panel);
    border: 2px solid var(--accent-red);
    border-radius: 20px;
    padding: 30px 20px;
    text-align: center;
    box-shadow: 0 0 30px rgba(255, 45, 45, 0.4);
    width: 100%;
    max-width: 400px;
    box-sizing: border-box;
  }

  .login-card h1 {
    font-size: 28px;
    letter-spacing: 4px;
    margin-top: 0;
    margin-bottom: 10px;
    color: white;
    text-shadow: 0 0 10px rgba(255, 45, 45, 0.6);
  }

  .login-card p {
    color: #888;
    font-size: 14px;
    margin-bottom: 30px;
  }

  #loginBtn {
    width: 100%;
    padding: 14px 20px;
    font-size: 16px;
    font-weight: bold;
    color: white;
    background: linear-gradient(135deg, var(--accent-red), #ff7300);
    border: none;
    border-radius: 30px;
    cursor: pointer;
    box-shadow: 0 0 20px rgba(255, 70, 0, 0.6);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  #loginBtn:hover {
    transform: scale(1.03);
    box-shadow: 0 0 25px rgba(255, 70, 0, 0.9);
  }

  /* Main Workspace */
  #chatScreen {
    display: flex;
    flex-direction: column;
    height: 100%;
    width: 100%;
  }

  /* Top Navigation Header Bar */
  .chat-header {
    background: var(--bg-panel);
    border-bottom: 2px solid var(--accent-red);
    padding: 10px 15px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    z-index: 10;
    height: 60px;
    box-sizing: border-box;
  }

  .brand-meta {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .brand-logo {
    font-weight: 900;
    font-size: 18px;
    letter-spacing: 2px;
    color: white;
    text-shadow: 0 0 8px var(--accent-red);
  }

  .current-profile {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #00000040;
    padding: 4px 8px;
    border-radius: 20px;
    border: 1px solid #333;
  }

  .current-profile img {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 1px solid var(--accent-orange);
    object-fit: cover;
  }

  .current-profile span {
    font-size: 12px;
    color: var(--accent-orange);
    font-weight: 600;
    max-width: 80px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .logout-btn {
    background: transparent;
    border: 1px solid #444;
    color: #aaa;
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.2s;
  }

  /* Messaging Log Window */
  .chat-body {
    flex: 1;
    overflow-y: auto;
    padding: 15px;
    background: 
      linear-gradient(rgba(6, 6, 6, 0.94), rgba(6, 6, 6, 0.94)),
      url('https://i.imgur.com/8N693aX.png');
    display: flex;
    flex-direction: column;
    gap: 15px;
  }

  /* Message Bubble Component Engine */
  .msg-row {
    display: flex;
    width: 100%;
    align-items: flex-end;
    gap: 8px;
  }

  .msg-row.me { justify-content: flex-end; }
  .msg-row.them { justify-content: flex-start; }

  .avatar-space {
    width: 32px;
    height: 32px;
    flex-shrink: 0;
  }

  .avatar-space img {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
    box-shadow: 0 0 6px rgba(0,0,0,0.5);
    border: 1px solid #444;
  }

  .bubble {
    max-width: 85%; /* Mobile optimized width */
    padding: 10px 14px;
    border-radius: 18px;
    position: relative;
    box-shadow: 0 2px 5px rgba(0,0,0,0.3);
    word-break: break-word;
    display: flex;
    flex-direction: column;
  }

  .me .bubble {
    background: var(--bubble-me);
    border: 1px solid #ff2d2d40;
    border-bottom-right-radius: 4px;
    color: #f5f5f5;
  }

  .them .bubble {
    background: var(--bubble-them);
    border: 1px solid #333;
    border-bottom-left-radius: 4px;
    color: #e0e0e0;
  }

  .msg-meta-name {
    font-size: 11px;
    font-weight: bold;
    margin-bottom: 4px;
  }
  .me .msg-meta-name { color: var(--accent-orange); text-align: right; }
  .them .msg-meta-name { color: #00adb5; text-align: left; }

  .msg-text { font-size: 14px; line-height: 1.4; }

  /* File Attachments Inside Bubbles */
  .msg-media {
    margin-top: 6px;
    border-radius: 8px;
    overflow: hidden;
    background: #00000050;
    border: 1px solid #444;
  }

  .msg-media img {
    max-width: 100%;
    max-height: 200px;
    display: block;
    object-fit: contain;
  }

  .doc-file-card {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px;
    text-decoration: none;
    color: white;
  }
  
  .doc-icon { font-size: 20px; }
  .doc-details { display: flex; flex-direction: column; overflow: hidden; }
  .doc-name { font-size: 13px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .doc-download-lbl { font-size: 10px; color: var(--accent-orange); margin-top: 2px; }

  .msg-timestamp {
    font-size: 10px;
    color: #777;
    margin-top: 5px;
    align-self: flex-end;
  }

  /* Bottom Input Controller Bar */
  .chat-footer {
    background: var(--bg-panel);
    padding: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-top: 1px solid #222;
    box-shadow: 0 -4px 15px rgba(0,0,0,0.6);
    box-sizing: border-box;
    padding-bottom: calc(10px + env(safe-area-inset-bottom)); /* iOS safe area */
  }

  .attach-btn-label {
    width: 40px;
    height: 40px;
    background: #1f1f1f;
    border: 1px solid #333;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--accent-red);
    flex-shrink: 0;
  }
  .attach-btn-label span { font-size: 26px; line-height: 1; margin-top: -2px; }

  .input-wrapper { flex: 1; }

  #chatTextInput {
    width: 100%;
    background: #161616;
    border: 1px solid #333;
    color: white;
    padding: 12px 14px;
    border-radius: 20px;
    font-size: 14px;
    box-sizing: border-box;
  }
  #chatTextInput:focus { border-color: var(--accent-red); outline: none; }

  #sendBtn {
    background: linear-gradient(135deg, var(--accent-red), #b30000);
    border: none;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  #sendBtn svg { width: 18px; height: 18px; fill: white; margin-left: 2px; }

  /* Desktop Adjustments */
  @media (min-width: 768px) {
    .bubble { max-width: 60%; }
    .brand-logo { font-size: 22px; }
    .chat-header { padding: 10px 20px; }
    .current-profile span { max-width: 150px; font-size: 14px; }
    .chat-footer { padding: 15px 20px; gap: 12px; }
    .attach-btn-label, #sendBtn { width: 44px; height: 44px; }
  }
</style>
</head>
<body>

<div id="loginScreen" class="hidden">
  <div class="login-card">
    <h1>ACCESSOR</h1>
    <p>Secure Peer-to-Peer Transmission</p>
    <button id="loginBtn">Sign In With Google</button>
  </div>
</div>

<div id="chatScreen" class="hidden">
  <header class="chat-header">
    <div class="brand-meta">
      <div class="brand-logo">ACCESSOR</div>
      <div class="current-profile">
        <img id="userHeaderAvatar" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="Avatar">
        <span id="userHeaderName">...</span>
      </div>
    </div>
    <button class="logout-btn" id="logoutBtn">Disconnect</button>
  </header>

  <main class="chat-body" id="chatDisplayPanel"></main>

  <footer class="chat-footer">
    <label for="fileAttachmentInput" class="attach-btn-label">
      <span>+</span>
    </label>
    <input type="file" id="fileAttachmentInput" style="display: none;">
    <div class="input-wrapper">
      <input type="text" id="chatTextInput" placeholder="Message...">
    </div>
    <button id="sendBtn">
      <svg viewBox="0 0 24 24"><path d="M2,21L23,12L2,3V10L17,12L2,14V21Z"/></svg>
    </button>
  </footer>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-auth.js";
  import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-database.js";
  import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

  const firebaseConfig = {
    apiKey: "AIzaSyBa4VeqtkTiG1DBcT8bb9mrFMoeJtfTfcU",
    authDomain: "project1-a8022.firebaseapp.com",
    databaseURL: "https://project1-a8022-default-rtdb.firebaseio.com", 
    projectId: "project1-a8022",
    storageBucket: "project1-a8022.appspot.com",
    messagingSenderId: "46609816135",
    appId: "1:46609816135:web:3c7b21c3c82c05cb682f62",
    measurementId: "G-WWSZV54BBK"
  };

  const SUPABASE_URL = "https://viwxoslxgwdchrpnuyze.supabase.co";
  const SUPABASE_KEY = "sb_publishable_LxlDxG5gLAaYLBpnsZD-Yw_Km4_P0MW";

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);
  const provider = new GoogleAuthProvider();
  const supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY);

  const loginScreen = document.getElementById("loginScreen");
  const chatScreen = document.getElementById("chatScreen");
  const loginBtn = document.getElementById("loginBtn");
  const logoutBtn = document.getElementById("logoutBtn");
  const chatDisplayPanel = document.getElementById("chatDisplayPanel");
  const chatTextInput = document.getElementById("chatTextInput");
  const sendBtn = document.getElementById("sendBtn");
  const fileAttachmentInput = document.getElementById("fileAttachmentInput");
  const userHeaderAvatar = document.getElementById("userHeaderAvatar");
  const userHeaderName = document.getElementById("userHeaderName");

  let localUserReference = null;
  let systematicChatInitialized = false;

  // Persistent Auth Listener
  onAuthStateChanged(auth, (user) => {
    if (user) {
      localUserReference = user;
      userHeaderAvatar.src = user.photoURL || 'https://api.dicebear.com/7.x/bottts/svg?seed=fallback';
      userHeaderName.innerText = user.displayName || user.email.split('@')[0];
      
      // Note: Removed the Realtime DB /users log here entirely for security as requested.
      
      loginScreen.classList.add("hidden");
      chatScreen.classList.remove("hidden");
      
      if (!systematicChatInitialized) bootChatEnginePipeline();
    } else {
      localUserReference = null;
      chatScreen.classList.add("hidden");
      loginScreen.classList.remove("hidden");
    }
  });

  loginBtn.addEventListener("click", async () => {
    try { await signInWithPopup(auth, provider); } 
    catch (err) { alert("Authentication Failed: " + err.message); }
  });

  logoutBtn.addEventListener("click", async () => {
    if(confirm("Disconnect session?")) {
      await signOut(auth);
      window.location.reload();
    }
  });

  function bootChatEnginePipeline() {
    systematicChatInitialized = true;
    onChildAdded(ref(db, 'messages'), (snapshot) => {
      if (snapshot.val()) renderMessageBubble(snapshot.val());
    });
    sendBtn.onclick = executeTextTransmission;
    chatTextInput.onkeypress = (e) => { if (e.key === 'Enter') executeTextTransmission(); };
    fileAttachmentInput.addEventListener("change", executeFileAttachmentUpload);
  }

  async function executeTextTransmission() {
    const textPayload = chatTextInput.value.trim();
    if (!textPayload || !localUserReference) return;

    chatTextInput.value = ''; 
    try {
      await push(ref(db, 'messages'), {
        uid: localUserReference.uid,
        senderName: localUserReference.displayName || localUserReference.email,
        senderPhoto: localUserReference.photoURL || '',
        text: textPayload,
        timestamp: Date.now()
      });
    } catch (err) { console.error("Sync fault:", err); }
  }

  async function executeFileAttachmentUpload(e) {
    const file = e.target.files[0];
    if (!file || !localUserReference) return;

    chatTextInput.disabled = true;
    chatTextInput.placeholder = `Uploading ${file.name}...`;

    const sanitizedFileName = `${Date.now()}_${file.name.replace(/[^a-zA-Z0-9.\-_]/g, '_')}`;

    try {
      const { error } = await supabaseClient.storage.from('photos').upload(sanitizedFileName, file);
      if (error) throw error;

      const publicAssetUrl = `${SUPABASE_URL}/storage/v1/object/public/photos/${sanitizedFileName}`;

      await push(ref(db, 'messages'), {
        uid: localUserReference.uid,
        senderName: localUserReference.displayName || localUserReference.email,
        senderPhoto: localUserReference.photoURL || '',
        text: `Shared a file`,
        fileUrl: publicAssetUrl,
        fileName: file.name,
        fileType: file.type,
        timestamp: Date.now()
      });
    } catch (err) {
      alert("Upload failed: " + err.message);
    } finally {
      fileAttachmentInput.value = '';
      chatTextInput.disabled = false;
      chatTextInput.placeholder = "Message...";
    }
  }

  function renderMessageBubble(msg) {
    const isMe = msg.uid === localUserReference?.uid;
    const directionClass = isMe ? 'me' : 'them';
    const fallbackUrl = 'https://api.dicebear.com/7.x/identicon/svg?seed=' + encodeURIComponent(msg.senderName);
    
    const row = document.createElement('div');
    row.className = `msg-row ${directionClass}`;

    // Profile picture block used for BOTH sender and receiver now
    const avatarTemplate = `
      <div class="avatar-space">
        <img src="${msg.senderPhoto || fallbackUrl}" alt="Profile" onerror="this.src='${fallbackUrl}'">
      </div>`;

    let attachmentTemplate = '';
    if (msg.fileUrl) {
      if (msg.fileType && msg.fileType.startsWith('image/')) {
        attachmentTemplate = `<div class="msg-media"><a href="${msg.fileUrl}" target="_blank"><img src="${msg.fileUrl}" loading="lazy"></a></div>`;
      } else {
        attachmentTemplate = `
          <div class="msg-media">
            <a href="${msg.fileUrl}" target="_blank" class="doc-file-card" download="${msg.fileName}">
              <div class="doc-icon">📁</div>
              <div class="doc-details"><span class="doc-name">${msg.fileName || 'Document'}</span><span class="doc-download-lbl">Download</span></div>
            </a>
          </div>`;
      }
    }

    const standardTimeSignature = new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

    // Build the UI based on who sent it to position the avatar properly
    const bubbleContent = `
      <div class="bubble">
        <span class="msg-meta-name">${msg.senderName.split('@')[0]}</span>
        <div class="msg-text">${msg.text}</div>
        ${attachmentTemplate}
        <span class="msg-timestamp">${standardTimeSignature}</span>
      </div>`;

    row.innerHTML = isMe ? bubbleContent + avatarTemplate : avatarTemplate + bubbleContent;

    chatDisplayPanel.appendChild(row);
    chatDisplayPanel.scrollTop = chatDisplayPanel.scrollHeight;
  }
</script>
</body>
</html>
